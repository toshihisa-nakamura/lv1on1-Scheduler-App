<script>
function show(role) {
  ['all','admin','coach','client'].forEach(function(r) {
    document.getElementById('view-'+r).style.display = (r===role) ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.remove('active');
    if (t.getAttribute('onclick') === "show('"+role+"')") t.classList.add('active');
  });
}
</script>
